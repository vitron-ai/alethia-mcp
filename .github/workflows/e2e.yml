# End-to-end run of `alethia run` against our own demo suite.
#
# This is the workflow that proves the full stack works together — bridge,
# runtime, NLP compiler, executor, policy gate, browser execution. The
# bridge's other CI (bridge-tests.yml) only covers unit + smoke tests of
# the bridge surface; this one drives a real demo through `alethia run`
# end-to-end.
#
# Spec: docs/e2e-ci-spec.md

name: e2e

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pin the runtime version so the cache key is stable + the test is
  # reproducible. Bump this in tandem with a new alethia-core release.
  ALETHIA_RUNTIME_VERSION: '0.7.4'
  # Demo's NLP file references http://localhost:8765/<demo>.html — the
  # static server below binds this port.
  DEMO_PORT: '8765'

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Allow unprivileged user namespaces
        # Ubuntu 24.04 added an AppArmor restriction on unprivileged user
        # namespace creation (kernel.apparmor_restrict_unprivileged_userns).
        # That restriction breaks the runtime's process-isolation model in
        # CI, where root-owned setuid helpers alone aren't sufficient.
        # Permitted only here in CI; production installs are unaffected.
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true

      - name: Install runtime system deps
        # The Alethia runtime requires a few common Linux GUI/system
        # libraries at the OS level + a virtual display, even when
        # ALETHIA_HEADLESS=1 suppresses any visible window. xvfb provides
        # that display in CI.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libnss3 \
            libatk1.0-0t64 \
            libatk-bridge2.0-0t64 \
            libgbm1 \
            libgtk-3-0t64 \
            libxss1 \
            libasound2t64 \
            xvfb

      - name: Install + build bridge from source
        # Use the PR's bridge code, not the published one — catches
        # regressions BEFORE they ship to npm.
        run: |
          npm ci
          npm run build

      - name: Cache the signed runtime
        # The bridge auto-fetches the runtime from GitHub Releases on first
        # use (~100 MB). On cache hit this is a no-op; on miss the bridge
        # downloads + Ed25519-verifies it.
        uses: actions/cache@v4
        with:
          path: ~/.alethia/runtime
          key: alethia-runtime-${{ runner.os }}-${{ env.ALETHIA_RUNTIME_VERSION }}

      - name: Start static demo server
        # python's http.server is preinstalled on ubuntu-latest; avoids
        # introducing an npm dep just for serving a directory.
        run: |
          python3 -m http.server ${{ env.DEMO_PORT }} --directory demo &
          echo "DEMO_PID=$!" >> $GITHUB_ENV
          # Wait for the port to be ready before kicking off the runtime.
          for i in 1 2 3 4 5; do
            if curl -sf http://localhost:${{ env.DEMO_PORT }}/ >/dev/null; then
              echo "Demo server ready on port ${{ env.DEMO_PORT }}"
              exit 0
            fi
            sleep 1
          done
          echo "Demo server failed to bind port ${{ env.DEMO_PORT }} after 5s"
          exit 1

      - name: Run alethia against the demo
        # The wrapping ::group:: collapsible keeps the GHA log scannable
        # while still surfacing per-step diagnostics on failure.
        # xvfb-run provides the virtual display the runtime expects.
        # ALETHIA_HEADLESS=1 keeps the cockpit window from being shown
        # *within* that virtual display.
        env:
          ALETHIA_HEADLESS: '1'
        run: |
          echo "::group::alethia run demo/claude-code-app.alethia"
          xvfb-run -a node dist/index.js run demo/claude-code-app.alethia
          echo "::endgroup::"

      - name: Stop demo server
        if: always()
        run: |
          if [ -n "${DEMO_PID:-}" ]; then kill "$DEMO_PID" 2>/dev/null || true; fi
